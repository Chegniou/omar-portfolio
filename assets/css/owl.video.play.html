<!DOCTYPE html>
<html>

<head>
    <title>404 - Not Found!</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">

    <link href="https://fonts.googleapis.com/css2?family=Carter+One&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Carter One', sans-serif;
        }

        #container {

            display: flex;
            justify-content: center;
            align-items: center;

            background: #131b24;

            min-height: 100vh;
        }

        #container .content {
            max-width: 600px;
            text-align: center;
        }

        #container .content h2 {
            font-size: 18vw;
            color: #fff;
            font-family: "Carter One";
            line-height: 1em;
        }

        @media only screen and (max-width: 600px) {
            #container .content h2 {
                font-size: 40vw;

            }
        }

        #container .content h4 {
            position: relative;
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #111;
            background: #fff;
            font-weight: 300;
            padding: 10px 20px;
            display: inline-block;
            font-family: "Carter One";
        }

        #container .content p {
            color: #fff;
            font-size: 1.2em;
        }

        #container .content a {
            position: relative;
            display: inline-block;
            padding: 10px 25px;
            background: #0098ef;
            color: #fff;
            text-decoration: none;
            margin-top: 25px;
            /* border-radius: 25px; */
            border-bottom: 4px solid #00629a;
        }
    </style>
</head>

<body>
    <div id="container">
        <div class="content">
            <h2>404</h2>
            <h4>Oops! Page not found.</h4>
            <p>The page you were looking for doesn't exist. You may have mistyped the address or the page may have
                moved.
            </p>
            <a href="/">Back To Home</a>
        </div>
    </div>
