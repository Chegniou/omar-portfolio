<div class="contact parallax_img">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 col-sm-12 m-auto">
                <div class="contact-form">
                    <div class="section-heading text-center">
                        <h2 class="section-title">Get in Touch</h2>
                        <p class="section-description">Have a project in mind or want to discuss a collaboration?
                            Feel free to contact me using the form below. I am always open
                            to new opportunities and challenges. </p>
                    </div>
                    <form [formGroup]="contactForm" (ngSubmit)="sendMessage()" class="form-area">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="input-area"> <input name="name" type="text" required formControlName="name"> <label
                                        class="floating-label">Name*</label> </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-area"> <input name="email" type="email" required formControlName="email"> <label
                                        class="floating-label">Email*</label> </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-area"> <input name="company" type="text" required formControlName="company"> <label
                                        class="floating-label">Company / Organization*</label> </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-area"> <input name="phone" type="tel" required formControlName="phone"> <label
                                        class="floating-label">Phone*</label> </div>
                            </div>
                            <div class="col-md-12">
                                <div class="text-area"> <textarea name="message" rows="6" required formControlName="message"></textarea>
                                    <label class="floating-label">Your Message *</label>
                                </div>
                            </div>
                            <div class="col-12 text-center"> <button name="submit"
                                    class="btn button-scheme" [disabled]="contactForm.invalid">Send Message</button> </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="row"> <!--Call us -->
            <div class="col-lg-8 col-sm-12 m-auto">
                <div class="row">
                    <div class="col-12 col-md-6 col-lg-4 contact-info">
                        <div class="icon-box"><span class="icon-phone"></span></div>
                        <h3>Call Us</h3>
                        <ul>
                            <li>(+216) 58197186</li>
                        </ul>
                    </div>
                   <div class="col-12 col-md-6 col-lg-4 contact-info">
                        <div class="icon-box">
                            <span class="icon-location"></span>
                        </div>
                        <h3>Location</h3>
                        <ul>
                            <li>Tunisia</li>
                        </ul>
                    </div>
                    <div class="col-12 col-md-6 col-lg-4 contact-info">
                        <div class="icon-box"><span class="icon-mail"></span></div>
                        <h3>Email Us</h3>
                        <ul>
                            <li><a href="mailto:omarchegniou@gmail.com" class="__cf_email__"
                                    >omarchegniou@gmail.com</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
