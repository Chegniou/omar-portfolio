<div class="left-side-area">
    <header class="header-left-area">
        <div class="container">
            <nav class="navbar">
                <div class="header-content">
                    <div class="image-item">
                        <div class="status active"></div>
                        <img src="assets/images/profile-image1.png" alt="" />
                    </div>
                    <div class="caption-area">
                        <h5 class="name">Chegniou Omar</h5>
                        <h6 class="designation skills cd-headline clip"> <span>{{ 'TITLE_PREFIX' | translate
                                }}&nbsp;</span>
                            <span class="cd-words-wrapper"> <b class="is-visible">Freelancer</b> <b>Developer</b>
                            </span>
                        </h6>
                    </div>
                </div> <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#side-menu"
                    aria-controls="side-menu" aria-expanded="false" aria-label="Toggle navigation"> <span
                        class="navbar-toggler-icon"> <span class="icon-thumbnails"></span> </span> </button>
                <div class="menu-main-area align-items-center">
                    <div class="collapse navbar-collapse" id="side-menu">
                        <ul id="menu_scroll" class="navbar-nav side-menu">
                            <li><a [routerLink]="[]" fragment="home" class="scroll"
                                    [class.active]="activeSection === 'home'"><span
                                        class="icon-home-house-streamline"></span> {{ 'MENU.HOME' | translate }}</a>
                            </li>
                            <li><a [routerLink]="[]" fragment="about" class="scroll"
                                    [class.active]="activeSection === 'about'"><span
                                        class="icon-map-streamline-user"></span>
                                    {{ 'MENU.ABOUT' | translate }}</a></li>
                            <li><a [routerLink]="[]" fragment="experience" class="scroll"
                                    [class.active]="activeSection === 'experience'"><span
                                        class="icon-dashboard-speed-streamline"></span> {{ 'MENU.EXPERIENCE' | translate
                                    }}</a></li>
                            <li><a [routerLink]="[]" fragment="services" class="scroll"
                                    [class.active]="activeSection === 'services'"><span
                                        class="icon-settings-streamline-1"></span>
                                    {{ 'MENU.SERVICES' | translate }}</a></li>
                            <li><a [routerLink]="[]" fragment="portfolio" class="scroll"
                                    [class.active]="activeSection === 'portfolio'"><span
                                        class="icon-streamline-suitcase-travel"></span> {{ 'MENU.PORTFOLIO' | translate
                                    }}</a></li>
                        </ul>
                        <div class="lang-switch">
                            <div class="switch">
                                <div class="slider" [ngStyle]="{'left': sliderPosition}"></div>
                                <button (click)="switchLang('fr')" [class.active]="currentLang === 'fr'">
                                    FR
                                </button>
                                <button (click)="switchLang('en')" [class.active]="currentLang === 'en'">
                                    EN
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <ul class="header-social-icons">
                    <li><a href="https://www.facebook.com/omar.chegniou" target="_blank" title="Facebook"> <i
                                class="fab fa-facebook-f"></i> </a></li>
                    <li><a href="https://www.linkedin.com/in/omar-chegniou-732012259/" target="_blank" title="Linkedin">
                            <i class="fab fa-linkedin"></i> </a></li>
                    <li><a href="https://www.instagram.com/omar_chegniou/" target="_blank" title="Instagram"> <i
                                class="fab fa-instagram"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>
</div>
