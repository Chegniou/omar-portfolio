<div class="contact parallax_img">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 col-sm-12 m-auto">
                <div class="contact-form">
                    <div class="section-heading text-center">
                        <h2 class="section-title">{{ 'CONTACT.TITLE' | translate }}</h2>
                        <p class="section-description">{{ 'CONTACT.DESC' | translate }} </p>
                    </div>
                    <form [formGroup]="contactForm" (ngSubmit)="sendMessage()" class="form-area">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="input-area"> <input name="name" type="text" required formControlName="name">
                                    <label class="floating-label">{{ 'CONTACT.FORM.NAME' | translate }}*</label> </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-area"> <input name="email" type="email" required
                                        formControlName="email"> <label class="floating-label">Email*</label> </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-area"> <input name="company" type="text" required
                                        formControlName="company"> <label class="floating-label">{{
                                        'CONTACT.FORM.COMPANY' | translate }}*</label> </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-area"> <input name="phone" type="tel" required
                                        formControlName="phone"> <label class="floating-label">{{ 'CONTACT.FORM.PHONE' |
                                        translate }}*</label> </div>
                            </div>
                            <div class="col-md-12">
                                <div class="text-area"> <textarea name="message" rows="6" required
                                        formControlName="message"></textarea>
                                    <label class="floating-label">{{ 'CONTACT.FORM.MESSAGE' | translate }}*</label>
                                </div>
                            </div>
                            <div class="col-12 text-center"> <button name="submit" class="btn button-scheme"
                                    [disabled]="contactForm.invalid">{{ 'CONTACT.FORM.BUTTON' | translate }}</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-8 col-sm-12 m-auto">
                <div class="row">
                    <div class="col-12 col-md-6 col-lg-4 contact-info">
                        <div class="icon-box"><span class="icon-phone"></span></div>
                        <h3>{{ 'CONTACT.INFO.CALL' | translate }}</h3>
                        <ul>
                            <li>(+216) 58197186</li>
                        </ul>
                    </div>
                    <div class="col-12 col-md-6 col-lg-4 contact-info">
                        <div class="icon-box">
                            <span class="icon-location"></span>
                        </div>
                        <h3>{{ 'CONTACT.INFO.LOCATION' | translate }}</h3>
                        <ul>
                            <li>Tunisia</li>
                        </ul>
                    </div>
                    <div class="col-12 col-md-6 col-lg-4 contact-info">
                        <div class="icon-box"><span class="icon-mail"></span></div>
                        <h3>Email</h3>
                        <ul>
                            <li><a href="mailto:omarchegniou@gmail.com" class="__cf_email__">omarchegniou@gmail.com</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
