<div class="modal-backdrop" (click)="close.emit()"></div>

<div class="project-modal">

    <!-- Header -->
    <div class="modal-header">
        <div>
            <h2>{{ project.title }}</h2>
            <p class="subtitle">{{ project.description }}</p>
        </div>
        <button class="close-btn" (click)="close.emit()">✕</button>
    </div>

    <!-- Gallery -->
    <div class="modal-gallery">
        <img *ngFor="let img of project.screenshots" [src]="img" />
    </div>

<div class="modal-section">
    <h3 class="section-title-pr">About the Project</h3>
    <p>
        {{ project.about }}
    </p>
</div>

<!-- Technologies -->
<div class="modal-section">
    <h3 class="section-title-pr">Tech Stack</h3>
    <div class="tech-list">
        <span *ngFor="let tech of project.technologies">{{ tech }}</span>
    </div>
</div>

    <!-- Context -->
    <div class="modal-section">
        <h3 class="section-title-pr">Project Details</h3>
        <div class="context-grid">
            <div class="context-card">
                <span>Type</span>
                <strong>{{ project.context.type }}</strong>
            </div>
            <div class="context-card">
                <span>Client</span>
                <strong>{{ project.context.client }}</strong>
            </div>
            <div class="context-card">
                <span>Role</span>
                <strong>{{ project.context.role }}</strong>
            </div>
            <div class="context-card">
                <span>Duration</span>
                <strong>{{ project.context.duration }}</strong>
            </div>
        </div>
    </div>

</div>
