<div id="portfolio" class="single-section silver-bg portfolio-area">
    <div class="container">
        <div class="row">
            <div class="col-md-12 col-lg-12">
                <div class="section-heading">
                    <h2 class="section-title">{{ "PORTFOLIO.TITLE" | translate }}</h2>
                    <p class="section-description">{{ "PORTFOLIO.DESC" | translate }}</p>
                </div>
            </div>
            <div class="col-md-12 col-lg-12">
                <div class="works-container row">
                    <div class="col-lg-4 col-sm-6 works-item design">
                        <div class="item-overlay">
                            <img src="assets/projects/order/screen1.png" alt="" />
                            <div class="overlay-content">
                                <h6 class="overlay-title">
                                    {{ "PORTFOLIO.PROJECTS.ORDER" | translate }}
                                </h6>
                                <div class="overlay-icons">
                                    <a (click)="openProject(project2)">
                                        <span class="icon-eye"></span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4 col-sm-6 works-item photos">
                        <div class="item-overlay">
                            <img src="assets/projects/stock/screen1.png" alt="" />
                            <div class="overlay-content">
                                <h6 class="overlay-title">
                                    {{ "PORTFOLIO.PROJECTS.STOCK" | translate }}
                                </h6>
                                <div class="overlay-icons">
                                    <a (click)="openProject(project3)">
                                        <span class="icon-eye"></span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4 col-sm-6 works-item photos">
                        <div class="item-overlay">
                            <img src="assets/projects/garage/screen1.png" alt="" />
                            <div class="overlay-content">
                                <h6 class="overlay-title">
                                    {{ "PORTFOLIO.PROJECTS.GARAGE" | translate }}
                                </h6>
                                <div class="overlay-icons">
                                    <a (click)="openProject(project4)">
                                        <span class="icon-eye"></span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-4 col-sm-6 works-item brand">
                        <div class="item-overlay">
                            <img src="assets/projects/ecommerce/screen12.png" alt="" />
                            <div class="overlay-content">
                                <h6 class="overlay-title">
                                    {{ "PORTFOLIO.PROJECTS.ECOMMERCE" | translate }}
                                </h6>
                                <div class="overlay-icons">
                                    <a (click)="openProject(project1)">
                                        <span class="icon-eye"></span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<app-project-modal *ngIf="selectedProject" [project]="selectedProject" (close)="closeModal()">
</app-project-modal>
